<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Romi Traders | International Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">ROMI TRADERS</a>
        <nav>
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="wishlist.html">Wishlist</a>
            <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
            <a href="login.html">Login</a>
        </nav>
    </header>

    <div class="container">
        <section class="hero">
            <h1>Welcome to Romi Traders</h1>
            <p>Your premium destination for worldwide quality products.</p>
        </section>

        <h2 style="font-size: 1.4rem; font-weight: 700; margin-bottom: 1rem;">Featured Products</h2>
        <div class="product-grid" id="product-list"></div>
    </div>

    <footer>
        <p>© 2026 Romi Traders. All rights reserved.</p>
    </footer>

    <script src="main.js"></script>
    <script>
        const grid = document.getElementById('product-list');
        PRODUCTS.forEach(p => {
            grid.innerHTML += `
                <div class="card">
                    <img src="${p.image}" alt="${p.name}">
                    <div class="card-body">
                        <div>
                            <div class="card-title">${p.name}</div>
                            <div class="card-price">$${p.price.toFixed(2)}</div>
                        </div>
                        <button class="btn" onclick="addToCart(${p.id})">Add to Cart</button>
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
