<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Romi Traders</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">ADMIN <span>PANEL</span></a>
        <nav><a href="index.html">View Store Site</a></nav>
    </header>

    <div class="container">
        <h1 style="margin-bottom: 1.5rem;">Store Administration</h1>

        <!-- Add New Product Form -->
        <div class="form-box" style="max-width: 100%; margin: 0 0 2rem 0;">
            <h3 style="margin-bottom: 1rem;">Add New Product (PKR)</h3>
            <form id="add-product-form" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; align-items: end;">
                <div class="form-group" style="margin: 0;">
                    <label>Product Name</label>
                    <input type="text" id="p-name" required placeholder="e.g. Wireless Mouse">
                </div>
                <div class="form-group" style="margin: 0;">
                    <label>Price in PKR (Rs.)</label>
                    <input type="number" id="p-price" required placeholder="e.g. 2500">
                </div>
                <div class="form-group" style="margin: 0;">
                    <label>Category</label>
                    <input type="text" id="p-category" required placeholder="e.g. Accessories">
                </div>
                <div class="form-group" style="margin: 0;">
                    <label>Image URL</label>
                    <input type="url" id="p-image" required placeholder="https://images.unsplash.com/...">
                </div>
                <button type="submit" class="btn btn-success" style="height: 45px;">+ Add Product</button>
            </form>
        </div>

        <!-- Current Products List -->
        <h3>Manage Current Products</h3>
        <table id="admin-product-table">
            <thead>
                <tr>
                    <th>Image</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Price (PKR)</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="admin-table-body"></tbody>
        </table>
    </div>

    <script src="main.js"></script>
    <script>
        function renderAdminProducts() {
            const products = getStoredProducts();
            const tbody = document.getElementById('admin-table-body');
            tbody.innerHTML = '';

            products.forEach(p => {
                tbody.innerHTML += `
                    <tr>
                        <td><img src="${p.image}" style="width: 50px; height: 50px; object-fit: cover; border-radius: 6px;"></td>
                        <td><strong>${p.name}</strong></td>
                        <td>${p.category}</td>
                        <td style="color: #10b981; font-weight: bold;">${formatPKR(p.price)}</td>
                        <td><button class="btn btn-danger" style="padding: 0.4rem 0.8rem; width: auto;" onclick="deleteProduct(${p.id})">Delete</button></td>
                    </tr>
                `;
            });
        }

        // Add Product Event
        document.getElementById('add-product-form').addEventListener('submit', (e) => {
            e.preventDefault();
            let products = getStoredProducts();
            const newProduct = {
                id: Date.now(),
                name: document.getElementById('p-name').value,
                price: parseFloat(document.getElementById('p-price').value),
                category: document.getElementById('p-category').value,
                image: document.getElementById('p-image').value
            };

            products.push(newProduct);
            saveStoredProducts(products);
            alert("New Product Added Successfully!");
            document.getElementById('add-product-form').reset();
            renderAdminProducts();
        });

        // Delete Product
        function deleteProduct(id) {
            if (confirm("Are you sure you want to delete this product?")) {
                let products = getStoredProducts().filter(p => p.id !== id);
                saveStoredProducts(products);
                renderAdminProducts();
            }
        }

        document.addEventListener("DOMContentLoaded", renderAdminProducts);
    </script>
</body>
</html>
