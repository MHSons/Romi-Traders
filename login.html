<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Romi Traders</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="form-box">
            <h2>Sign In</h2>
            <form style="margin-top:1rem;">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" required>
                </div>
                <button class="btn" type="submit">Login</button>
            </form>
            <p style="margin-top: 1rem; text-align: center;">Don't have an account? <a href="register.html">Register</a></p>
        </div>
    </div>
</body>
</html>
