<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Romi Traders</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">ROMI <span>TRADERS</span></a>
        <nav><a href="index.html">Home</a></nav>
    </header>

    <div class="container">
        <div class="form-box">
            <h2 style="margin-bottom: 0.5rem;">Customer Login</h2>
            <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 1.5rem;">Enter your details to sign in to your account</p>
            
            <form id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required placeholder="user@gmail.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn">Sign In</button>
            </form>
            <p style="margin-top: 1.2rem; text-align: center; font-size: 0.9rem; color: #64748b;">
                Don't have an account? <a href="register.html" style="color: #0284c7; font-weight: bold; text-decoration: none;">Register Now</a>
            </p>
        </div>
    </div>

    <script src="main.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const name = email.split('@')[0];
            
            // Save Login State
            localStorage.setItem('romi_user', JSON.stringify({ name: name, email: email }));
            alert("Login Successful! Welcome back.");
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
