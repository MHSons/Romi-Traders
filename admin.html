<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login - Romi Traders</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="form-box">
            <h2>Admin Login</h2>
            <form action="admin-panel.html" style="margin-top:1rem;">
                <div class="form-group">
                    <label>Admin Username</label>
                    <input type="text" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" required>
                </div>
                <button class="btn" type="submit">Access Control Panel</button>
            </form>
        </div>
    </div>
</body>
</html>
