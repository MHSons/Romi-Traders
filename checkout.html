<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Romi Traders</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">ROMI TRADERS</a>
    </header>

    <div class="container">
        <div class="form-box" style="max-width: 600px;">
            <h2>Checkout & Shipping</h2>
            <form id="checkout-form" style="margin-top: 1rem;">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Shipping Address</label>
                    <textarea required placeholder="Full international delivery address..."></textarea>
                </div>
                <div class="form-group">
                    <label>Payment Method</label>
                    <select id="payment">
                        <option>Credit Card (Stripe Automated)</option>
                        <option>PayPal Express</option>
                        <option>Cash on Delivery</option>
                    </select>
                </div>
                <button type="submit" class="btn">Place Order Now</button>
            </form>
        </div>
    </div>

    <script src="main.js"></script>
    <script>
        document.getElementById('checkout-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert("Order placed successfully! Redirecting to my orders.");
            localStorage.removeItem('cart');
            window.location.href = 'my-orders.html';
        });
    </script>
</body>
</html>
