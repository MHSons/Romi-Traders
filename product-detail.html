<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Romi Traders</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">ROMI TRADERS</a>
        <nav>
            <a href="products.html">Back to Products</a>
            <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
        </nav>
    </header>

    <div class="container" id="detail-container"></div>

    <script src="main.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const id = parseInt(params.get('id')) || 1;
        const p = PRODUCTS.find(item => item.id === id);

        document.getElementById('detail-container').innerHTML = `
            <div style="display: flex; gap: 2rem; background: white; padding: 2rem; border-radius: 10px; margin-top: 2rem; flex-wrap: wrap;">
                <img src="${p.image}" style="width: 100%; max-width: 400px; border-radius: 8px;">
                <div style="flex: 1;">
                    <h2>${p.name}</h2>
                    <p style="color: #64748b; margin: 0.5rem 0;">Category: ${p.category}</p>
                    <h3 style="color: #0284c7; margin: 1rem 0;">$${p.price.toFixed(2)}</h3>
                    <p style="margin-bottom: 1.5rem;">High-quality international standard item guaranteed with full warrantee and global shipping.</p>
                    <button class="btn" onclick="addToCart(${p.id})">Add to Shopping Cart</button>
                </div>
            </div>
        `;
    </script>
</body>
</html>
